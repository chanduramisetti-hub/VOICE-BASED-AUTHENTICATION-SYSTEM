<!DOCTYPE html>
<html>
<head>
<title>Register Voice</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h2>Voice Registration</h2>

<p class="phrase">
Please read this sentence clearly:
</p>

<p class="sample">
"Hello, this is my secure voice authentication sample.
I am verifying my identity for this system."
</p>

<input type="text" id="username" placeholder="Enter Username">

<button onclick="startRec()">Start Recording</button>
<button onclick="stopRec()">Stop</button>
<button onclick="registerVoice()">Register</button>

<p id="status"></p>

</div>

<script>

let recorder
let chunks=[]

async function startRec(){

let stream = await navigator.mediaDevices.getUserMedia({audio:true})

recorder = new MediaRecorder(stream)

recorder.start()

chunks=[]

recorder.ondataavailable = e=>chunks.push(e.data)

document.getElementById("status").innerText="Recording..."
}

function stopRec(){

recorder.stop()

document.getElementById("status").innerText="Recording stopped"
}

function registerVoice(){

let blob = new Blob(chunks,{type:'audio/webm'})

let form = new FormData()

form.append("username",document.getElementById("username").value)

form.append("audio",blob,"voice.webm")

fetch("/register",{method:"POST",body:form})
.then(r=>r.json())
.then(data=>{
document.getElementById("status").innerText=data.message
})
}

</script>

</body>
</html>
